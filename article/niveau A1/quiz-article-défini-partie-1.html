<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Article défini part 1 niveau A1</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 650px; margin: 40px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
        .options { margin: 10px 0; }
        button { margin-top: 15px; padding: 10px; cursor: pointer; width: 100%; background-color: #007bff; color: white; border: none; border-radius: 4px; font-size: 16px; }
        button:hover { background-color: #0056b3; }

        /* Style pour aligner le texte et l'image côte à côte */
        .zone-entete {
            display: flex;         
            align-items: center;   
            justify-content: space-between; 
            gap: 20px;             
            margin-bottom: 20px;
        }
        #quiz-image {
            max-width: 140px;      
            max-height: 140px;
            object-fit: contain;   
            border-radius: 6px;    
        }
        #question {
            flex: 1;                
            margin: 0;
            font-size: 20px;
        }
        
        /* Style ajouté pour le lecteur Audio */
        #quiz-audio {
            width: 100%;
            margin: 10px 0 15px 0;
        }

        /* Styles pour le rapport de fin */
        .bloc-bilan {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            border-left: 5px solid #ccc;
            background-color: #fcfcfc;
            text-align: left;
        }
        .bilan-juste { border-left-color: #28a745; background-color: #ebf7ee; }
        .bilan-faux { border-left-color: #dc3545; background-color: #fdf2f2; }
        .texte-juste { color: #28a745; font-weight: bold; }
        .texte-faux { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div class="zone-entete">
        <h2 id="question">Question s'affichera ici</h2>
        <img id="quiz-image" src="" alt="Illustration" style="display: none;">
    </div>
    
    <audio id="quiz-audio" controls style="display: none;"></audio>
    
    <div id="options-container"></div>
    <button id="submit-btn">Valider la réponse</button>
</div>

<script>
// --- ZONE MODIFIABLE : Ajoutez ou modifiez vos questions ici ---
const mesQuestions = [
    
	
	
	
	
	{
        type: "qcm",
        question: "Articles « définis et indéfinis au singulier (un - une - le - la - l') » Voulez-vous commencer ? ",
        reponses: ["oui"],
        correcte: 0, 
        image: "",
        audio: "" 
    },  
    {
        type: "multi-trous",
        question: "Complétez avec l'article défini ou indéfini qui convient (un - une - le - la - l') :",
        noms: [
            "1. *** matin, *** soleil se lève doucement sur la ville.",
            "2. *** oiseau commence à chanter sur *** branche.",
            "3. Dans *** petite rue calme, *** boulanger ouvre sa boutique.",
            "4. *** odeur de pain chaud attire rapidement *** premier client.",
            "5. C'est *** homme pressé qui cherche *** croissant bien cuit.",
            "6. Il pose *** pièce sur *** comptoir et repart aussitôt.",
            "7. Un peu plus loin, *** jeune fille promène *** chien.",
            "8. *** animal s'arrête brusquement devant *** arbre.",
            "9. Il a aperçu *** chat qui dort paisiblement au soleil.",
            "10. *** chat ouvre *** œil, regarde le chien et se rendort.",
            "11. Dans *** ciel, *** nuage blanc cache un instant le soleil.",
            "12. *** horloge de *** église sonne huit heures.",
            "13. À ce moment, *** facteur commence sa tournée quotidienne.",
            "14. Il glisse *** lettre importante dans *** boîte aux lettres.",
            "15. *** enveloppe est bleue et porte *** timbre étranger.",
            
        ],
        correcte: [
            "Le", "le", "Un", "une", "une", "le", "L'", "un", "un", "un",
            "une", "le", "une", "un", "L'", "un", "un", "Le", "un", "le",
            "un", "L'", "l'", "le", "une", "la", "L'", "un",
            
        ],
        image: "",
        audio: ""
    }
];
// --------------------------------------------------------------

let indexQuestionActuelle = 0;
let score = 0;
const historiqueReponses = [];

function chargerQuestion() {
    const q = mesQuestions[indexQuestionActuelle];
    document.getElementById("question").textContent = q.question;
    
    const imageElement = document.getElementById("quiz-image");
    if (imageElement) {
        if (q.image && q.image !== "") {
            imageElement.src = q.image;
            imageElement.style.display = "block";
        } else {
            imageElement.style.display = "none";
        }
    }

    const audioElement = document.getElementById("quiz-audio");
    if (audioElement) {
        if (q.audio && q.audio !== "") {
            audioElement.src = q.audio;
            audioElement.style.display = "block"; 
            audioElement.load();                  
        } else {
            audioElement.style.display = "none";  
            audioElement.src = "";
        }
    }

    const optionsDiv = document.getElementById("options-container");
    optionsDiv.innerHTML = ""; 
    
    if (q.type === "texte") {
        optionsDiv.innerHTML = `
            <input type="text" id="reponse-texte" placeholder="Tapez votre réponse ici..." 
                   style="padding: 10px; width: 96%; font-size: 16px; margin-top: 10px; border-radius: 4px; border: 1px solid #ccc;">
        `;
    } 
    else if (q.type === "multi-trous") {
        let htmlFormulaire = '<div style="display: flex; flex-direction: column; gap: 12px; margin-top: 15px; max-height: 420px; overflow-y: auto; padding-right: 10px;">';
        
        let compteurTrou = 0; 

        q.noms.forEach((nom) => {
            let ligneHtml = `<div style="display: flex; align-items: center; flex-wrap: wrap; background: #f9f9f9; padding: 8px 12px; border-radius: 4px; border: 1px solid #eee; font-size: 16px; line-height: 1.6;">`;
            
            const segments = nom.split("***");
            
            segments.forEach((segment, idxSegment) => {
                ligneHtml += `<span>${segment}</span>`;
                if (idxSegment < segments.length - 1) {
                    ligneHtml += `
                        <input type="text" class="reponse-multi" data-index="${compteurTrou}" placeholder="..." 
                               style="padding: 4px; width: 65px; font-size: 15px; border: 1px solid #ccc; border-radius: 4px; text-align: center; margin: 0 5px; font-weight: bold;">
                    `;
                    compteurTrou++;
                }
            });
            
            ligneHtml += `</div>`;
            htmlFormulaire += ligneHtml;
        });
        
        htmlFormulaire += '</div>';
        optionsDiv.innerHTML = htmlFormulaire;
    } 
    else {
        q.reponses.forEach((reponse, index) => {
            optionsDiv.innerHTML += `
                <div class="options">
                    <input type="radio" name="quiz" id="opt${index}" value="${index}">
                    <label for="opt${index}" style="font-size: 16px; margin-left: 8px; cursor:pointer;">${reponse}</label>
                </div>`;
        });
    }
}

document.getElementById("submit-btn").addEventListener("click", () => {
    const q = mesQuestions[indexQuestionActuelle];
    
    const audioElement = document.getElementById("quiz-audio");
    if (audioElement) { audioElement.pause(); }

    let estCorrect = false;
    let detailBilan = ""; 

    if (q.type === "texte") {
        const inputTexte = document.getElementById("reponse-texte");
        if (!inputTexte || inputTexte.value.trim() === "") return alert("Veuillez écrire une réponse !");
        
        const valeurSaisie = inputTexte.value.trim();
        estCorrect = (valeurSaisie.toLowerCase() === q.correcte.toLowerCase());
        detailBilan = `Votre réponse : "<strong>${valeurSaisie}</strong>" | Attendu : "<strong>${q.correcte}</strong>"`;
        
        if (estCorrect) score++;
    } 
    else if (q.type === "multi-trous") {
        const toutesLesCases = document.querySelectorAll('.reponse-multi');
        let toutesJustes = true;
        let uneCaseVide = false;
        let dictionnaireSaisies = {};

        toutesLesCases.forEach((input) => {
            const indexAttendu = parseInt(input.getAttribute('data-index'));
            const valeurSaisie = input.value.trim();
            dictionnaireSaisies[indexAttendu] = valeurSaisie;

            if (valeurSaisie === "") uneCaseVide = true;
            if (valeurSaisie.toLowerCase() !== q.correcte[indexAttendu].toLowerCase()) {
                toutesJustes = false;
            }
        });

        if (uneCaseVide) return alert("Veuillez remplir toutes les zones de texte !");
        
        estCorrect = toutesJustes;
        detailBilan = "<ul style='margin:5px 0; padding-left:20px; max-height: 250px; overflow-y: auto;'>";
        
        let localTrouIdx = 0;
        q.noms.forEach((nom) => {
            let segmentsBilan = nom.split("***");
            let reconsctructionLigne = "";
            let ligneEstErreur = false;
            
            segmentsBilan.forEach((seg, sIdx) => {
                reconsctructionLigne += seg;
                if (sIdx < segmentsBilan.length - 1) {
                    let saisieUser = dictionnaireSaisies[localTrouIdx];
                    let attenduDuTrou = q.correcte[localTrouIdx];
                    if (saisieUser.toLowerCase() === attenduDuTrou.toLowerCase()) {
                        reconsctructionLigne += ` [ <strong style="color:green;">${saisieUser}</strong> ] `;
                    } else {
                        reconsctructionLigne += ` [ <strong style="color:red; text-decoration:line-through;">${saisieUser}</strong> -> <strong style="color:green;">${attenduDuTrou}</strong> ] `;
                        ligneEstErreur = true;
                    }
                    localTrouIdx++;
                }
            });
            
            let iconeStatut = ligneEstErreur ? "❌ " : "✅ ";
            detailBilan += `<li style="margin-bottom: 4px; list-style:none;">${iconeStatut}${reconsctructionLigne}</li>`;
        });
        detailBilan += "</ul>";
        
        if (estCorrect) score++;
    } 
    else {
        const selection = document.querySelector('input[name="quiz"]:checked');
        if (!selection) return alert("Veuillez sélectionner une réponse !");
        
        const indexChoisi = parseInt(selection.value);
        const reponsesPossibles = q.correcte;
        
        if (Array.isArray(reponsesPossibles)) {
            estCorrect = reponsesPossibles.includes(indexChoisi);
            detailBilan = `Vous avez cliqué sur : "<strong>${q.reponses[indexChoisi]}</strong>" (Toutes les options étaient valides)`;
        } else {
            estCorrect = (indexChoisi === reponsesPossibles);
            detailBilan = `Votre choix : "<strong>${q.reponses[indexChoisi]}</strong>" | Attendu : "<strong>${q.reponses[reponsesPossibles]}</strong>"`;
        }
        
        if (estCorrect) score++;
    }
    
    historiqueReponses.push({
        question: q.question,
        estCorrect: estCorrect,
        detail: detailBilan
    });
    
    indexQuestionActuelle++;
    if (indexQuestionActuelle < mesQuestions.length) {
        chargerQuestion();
    } else {
        afficherRapportFinal();
    }
});

function afficherRapportFinal() {
    let htmlBilan = `
        <div style="text-align:center; padding: 10px;">
            <h2>Fin du quiz !</h2>
            <p style="font-size: 22px; margin-bottom: 30px;">Votre score : <strong>${score} / ${mesQuestions.length}</strong></p>
            <h3>Rapport détaillé de vos réponses :</h3>
        </div>
    `;

    historiqueReponses.forEach((item, index) => {
        const classeStyle = item.estCorrect ? "bloc-bilan bilan-juste" : "bloc-bilan bilan-faux";
        const pastilleStatut = item.estCorrect ? "<span class='texte-juste'>[✓ Sans faute]</span>" : "<span class='texte-faux'>[✗ Des erreurs ont été commises]</span>";

        htmlBilan += `
            <div class="${classeStyle}">
                <strong>Question ${index + 1}:</strong> ${item.question} <br>
                <div style="margin-top: 8px; font-size: 14px; color: #444;">
                    ${pastilleStatut} <br><br> ${item.detail}
                </div>
            </div>
        `;
    });

    document.getElementById("quiz-container").innerHTML = htmlBilan;
}

chargerQuestion();
</script>
<script src="../../securite.js"></script>
</body>
</html>
