<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu du Pendu - Le Parc et la Nature</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f0f7f4; padding: 20px; color: #1c3327; }
        h1 { color: #2e5a44; }
        .word-display { font-size: 2rem; letter-spacing: 0.5rem; margin: 20px; font-weight: bold; text-transform: uppercase; }
        .letters-container { display: flex; flex-wrap: wrap; justify-content: center; max-width: 600px; margin: 0 auto; }
        .letter-btn { margin: 5px; padding: 10px 15px; font-size: 1.1rem; cursor: pointer; background-color: #fff; border: 2px solid #2e5a44; border-radius: 5px; color: #2e5a44; font-weight: bold; }
        .letter-btn:disabled { background-color: #ddd; border-color: #ccc; color: #888; cursor: not-allowed; }
        .message { font-size: 1.5rem; margin: 20px; font-weight: bold; }
        .info { font-size: 1.2rem; margin: 10px; color: #444; font-weight: bold; }
        button#restart { padding: 12px 25px; font-size: 1.1rem; background-color: #2e5a44; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 20px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button#restart:hover { background-color: #1c3327; }
        
        /* Style pour la zone d'image d'aide */
        .image-container { margin: 20px auto; min-height: 200px; display: flex; justify-content: center; align-items: center; }
        .game-image { max-width: 250px; max-height: 250px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.15); border: 3px solid #2e5a44; background-color: #e0eada; }
        .victory-image { border: 3px solid #28a745; box-shadow: 0 4px 15px rgba(40,167,69,0.5); } 
    </style>
</head>
<body>

    <h1>🌳 Le Jeu du Pendu : Le Parc & La Nature 🍃 par JPJ</h1>
    <div class="info">Vies restantes : <span id="lives">4</span></div>
    
    <div class="image-container">
        <img id="gameImage" class="game-image" src="" alt="Aide visuelle">
    </div>

    <div class="word-display" id="wordDisplay"></div>
    <div class="letters-container" id="lettersContainer"></div>
    <div class="message" id="message"></div>
    
    <button id="restart" onclick="initGame()">Changer de mot 🔄</button>

    <script>
        // 1. LA LISTE COMPLÈTE DES MOTS DE LA NATURE ET LEURS IMAGES ASSOCIEES
        const listeMots = [
            { mot: "un arbre", imgIndex: "arbre.jpg" },
            { mot: "un arbuste", imgIndex: "arbuste.jpg" },
            { mot: "un buisson", imgIndex: "buisson.jpg" },
            { mot: "une baie", imgIndex: "baie.jpg" },
            { mot: "une pelouse", imgIndex: "pelouse.jpg" },
            { mot: "un parterre de fleurs", imgIndex: "parterredefleurs.jpg" },
            { mot: "un massif floral", imgIndex: "massiffloral.jpg" },
            { mot: "la mousse", imgIndex: "mousse.jpg" },
            { mot: "une plante", imgIndex: "plante.jpg" },
            { mot: "un étang", imgIndex: "etang.jpg" },
            { mot: "un bassin", imgIndex: "bassin.jpg" },
            { mot: "un lac", imgIndex: "lac.jpg" },
            { mot: "une fontaine", imgIndex: "fontaine.jpg" },
            { mot: "un ruisseau", imgIndex: "ruisseau.jpg" },
            { mot: "un canard", imgIndex: "canard.jpg" },
            { mot: "un nénuphar", imgIndex: "nenuphar.jpg" },
            { mot: "une allée", imgIndex: "allee.jpg" },
            { mot: "un sentier", imgIndex: "sentier.jpg" },
            { mot: "une clairière", imgIndex: "clairiere.jpg" },
            { mot: "un banc", imgIndex: "banc.jpg" },
            { mot: "une chaise", imgIndex: "chaise.jpg" },
            { mot: "une table", imgIndex: "table.jpg" },
            { mot: "une tonelle", imgIndex: "tonelle.jpg" },
            { mot: "un kiosque", imgIndex: "kiosque.jpg" },
            { mot: "une poubelle", imgIndex: "poubelle.jpg" },
            { mot: "un distributeur de sacs", imgIndex: "distributeurdesacs.jpg" },
            { mot: "un lampadaire", imgIndex: "lampadaire.jpg" },
            { mot: "une barrière", imgIndex: "barriere.jpg" },
            { mot: "une grille", imgIndex: "grille.jpg" },
            { mot: "un panneau", imgIndex: "panneau.jpg" },
            { mot: "un plan", imgIndex: "plan.jpg" },
            { mot: "un règlement", imgIndex: "reglement.jpg" },
            { mot: "un tobogan", imgIndex: "tobogan.jpg" },
            { mot: "une balancoire", imgIndex: "balancoire.jpg" },
            { mot: "un bac à sable", imgIndex: "bacasable.jpg" },
            { mot: "un tourniquet", imgIndex: "tourniquet.jpg" },
			{ mot: "une table de pique nique", imgIndex: "tablepicnic.jpg" },
            { mot: "table de ping pong", imgIndex: "tabledepingpong.jpg" },
            { mot: "un terrain de pétanque", imgIndex: "terraindepetanque.jpg" },
            { mot: "une piste cyclable", imgIndex: "pistecyclable.jpg" },
            { mot: "une voie verte", imgIndex: "voieverte.jpg" },
            { mot: "un caniparc", imgIndex: "caniparc.jpg" },
            { mot: "un potager", imgIndex: "potager.jpg" },
            { mot: "une serre", imgIndex: "serre.jpg" },
            { mot: "un pigeon", imgIndex: "pigeon.jpg" },
            { mot: "un moineau", imgIndex: "moineau.jpg" },
            { mot: "un corbeau", imgIndex: "corbeau.jpg" },
            { mot: "un cygne", imgIndex: "cygne.jpg" },
            { mot: "une oie", imgIndex: "oie.jpg" },
            { mot: "un héron", imgIndex: "heron.jpg" },
            { mot: "un écureuil", imgIndex: "ecureuil.jpg" },
            { mot: "un hérisson", imgIndex: "herisson.jpg" },
            { mot: "une abeille", imgIndex: "abeille.jpg" },
            { mot: "un papillon", imgIndex: "papillon.jpg" },
            { mot: "une libellule", imgIndex: "libellule.jpg" },
            { mot: "un rongeur", imgIndex: "rongeur.jpg" },
            { mot: "un marcheur", imgIndex: "marcheur.jpg" },
            { mot: "une famille", imgIndex: "famille.jpg" },
            { mot: "un couple", imgIndex: "couple.jpg" },
            { mot: "un joggeur", imgIndex: "joggeur.jpg" },
            { mot: "un cycliste", imgIndex: "cycliste.jpg" },
            { mot: "un jardinier", imgIndex: "jardinier.jpg" },
            { mot: "un agent d'entretien", "imgIndex": "agentdentretien.jpg" },
            { mot: "un garde urbain", imgIndex: "gardeurbain.jpg" },
            { mot: "une statue", imgIndex: "statue.jpg" },
            { mot: "un vendeur ambulant", imgIndex: "vendeurambulant.jpg" },
            { mot: "une glace", imgIndex: "glace.jpg" },
            { mot: "une gaufre", imgIndex: "gaufre.jpg" },
            { mot: "une artiste", imgIndex: "artiste.jpg" }
        ];

        // 2. IMAGE DE VICTOIRE
        const imageVictoire = "victoire.jpg";

        let currentWordObject = null;
        let wordToGuess = "";
        let displayedWord = [];
        let maxLives = 4;
        let currentLives = maxLives;

        // Fonction pour retirer les accents et passer en minuscule pour simplifier le test des touches
        function normalizeString(str) {
            return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
        }

        function initGame() {
            currentLives = maxLives;
            document.getElementById("lives").textContent = currentLives;
            document.getElementById("message").textContent = "";
            
            // Tirage aléatoire
            const randomIndex = Math.floor(Math.random() * listeMots.length);
            currentWordObject = listeMots[randomIndex];
            wordToGuess = currentWordObject.mot;

            // Afficher l'image d'aide correspondante (recherche dans votre sous-dossier d'images)
            const imgElement = document.getElementById("gameImage");
            imgElement.src = "images/" + currentWordObject.imgIndex; 
            imgElement.classList.remove("victory-image");
            imgElement.style.display = "block";
            
            // Préparation des tirets / espaces / apostrophes
            displayedWord = [];
            for (let char of wordToGuess) {
                if (char === " ") {
                    displayedWord.push(" ");
                } else if (char === "-") {
                    displayedWord.push("-");
                } else if (char === "'") {
                    displayedWord.push("'");
                } else {
                    displayedWord.push("_");
                }
            }
            
            renderWord();
            generateKeyboard();
        }

        function renderWord() {
            const htmlDisplay = displayedWord.map(char => {
                if (char === " ") return "&nbsp;&nbsp;&nbsp;";
                return char;
            }).join(" ");
            document.getElementById("wordDisplay").innerHTML = htmlDisplay;
        }

        function generateKeyboard() {
            const container = document.getElementById("lettersContainer");
            container.innerHTML = "";
            const alphabet = "abcdefghijklmnopqrstuvwxyz";
            for (let letter of alphabet) {
                const btn = document.createElement("button");
                btn.textContent = letter.toUpperCase();
                btn.classList.add("letter-btn");
                btn.onclick = () => guessLetter(letter, btn);
                container.appendChild(btn);
            }
        }

        function guessLetter(letter, buttonElement) {
            buttonElement.disabled = true;
            let letterFound = false;
            const normalizedTarget = normalizeString(wordToGuess);

            for (let i = 0; i < normalizedTarget.length; i++) {
                if (normalizedTarget[i] === letter) {
                    displayedWord[i] = wordToGuess[i];
                    letterFound = true;
                }
            }

            if (letterFound) {
                renderWord();
                checkWin();
            } else {
                currentLives--;
                document.getElementById("lives").textContent = currentLives;
                checkLose();
            }
        }

        function checkWin() {
            if (!displayedWord.includes("_")) {
                document.getElementById("message").innerHTML = "🎉 Bravo ! Vous avez gagné !";
                disableAllButtons();
                
                // Remplacer l'aide par l'image de réussite générale
                const imgElement = document.getElementById("gameImage");
                imgElement.src = "images/" + imageVictoire;
                imgElement.classList.add("victory-image");
            }
        }

        function checkLose() {
            if (currentLives <= 0) {
                document.getElementById("message").innerHTML = `💥 Perdu ! Le mot était : <span style="color:#d9534f;">"${wordToGuess.toUpperCase()}"</span>`;
                disableAllButtons();
            }
        }

        function disableAllButtons() {
            const buttons = document.querySelectorAll(".letter-btn");
            buttons.forEach(btn => btn.disabled = true);
        }

        // Lancement initial
        initGame();
    </script>
<script src="../../securite.js"></script>
</body>
</html>
