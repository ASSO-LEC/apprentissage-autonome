<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu du Pendu - À la Plage</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #fcf8f2; padding: 20px; color: #3b3023; }
        h1 { color: #d97724; }
        .word-display { font-size: 2rem; letter-spacing: 0.5rem; margin: 20px; font-weight: bold; text-transform: uppercase; }
        .letters-container { display: flex; flex-wrap: wrap; justify-content: center; max-width: 600px; margin: 0 auto; }
        .letter-btn { margin: 5px; padding: 10px 15px; font-size: 1.1rem; cursor: pointer; background-color: #fff; border: 2px solid #0077b6; border-radius: 5px; color: #0077b6; font-weight: bold; }
        .letter-btn:disabled { background-color: #ddd; border-color: #ccc; color: #888; cursor: not-allowed; }
        .message { font-size: 1.5rem; margin: 20px; font-weight: bold; }
        .info { font-size: 1.2rem; margin: 10px; color: #555; font-weight: bold; }
        button#restart { padding: 12px 25px; font-size: 1.1rem; background-color: #d97724; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 20px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button#restart:hover { background-color: #bfa31f; }
        
        /* Style pour la zone d'image d'aide */
        .image-container { margin: 20px auto; min-height: 200px; display: flex; justify-content: center; align-items: center; }
        .game-image { max-width: 250px; max-height: 250px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.15); border: 3px solid #0077b6; background-color: #eef7fc; }
        .victory-image { border: 3px solid #28a745; box-shadow: 0 4px 15px rgba(40,167,69,0.5); } 
    </style>
</head>
<body>

    <h1>🏖️ Le Jeu du Pendu : À la Plage ! 🌊</h1>
    <div class="info">Vies restantes : <span id="lives">4</span></div>
    
    <div class="image-container">
        <img id="gameImage" class="game-image" src="" alt="Aide visuelle">
    </div>

    <div class="word-display" id="wordDisplay"></div>
    <div class="letters-container" id="lettersContainer"></div>
    <div class="message" id="message"></div>
    
    <button id="restart" onclick="initGame()">Changer de mot avec JPJ🔄</button>

    <script>
        // 1. LA LISTE DES MOTS DE LA PLAGE ET LEURS IMAGES ASSOCIEES
        const listeMots = [
            { mot: "un ballon", imgIndex: "ballon.jpg" },
            { mot: "un bateau", imgIndex: "bateau.jpg" },
            { mot: "une bouée", imgIndex: "bouee.jpg" },
            { mot: "un bronzage", imgIndex: "bronzage.jpg" },
            { mot: "un château de sable", imgIndex: "chateaudesable.jpg" },
            { mot: "un coquillage", imgIndex: "coquillage.jpg" },
            { mot: "un crabe", imgIndex: "crabe.jpg" },
            { mot: "une crème solaire", imgIndex: "cremesolaire.jpg" },
            { mot: "une crevette", imgIndex: "crevette.jpg" },
            { mot: "crustacé", imgIndex: "crustace.jpg" },
            { mot: "dune", imgIndex: "dune.jpg" },
            { mot: "une étoile de mer", imgIndex: "etoiledemer.jpg" },
            { mot: "une falaise", imgIndex: "falaise.jpg" },
            { mot: "des lunettes de soleil", imgIndex: "lunettesdesoleil.jpg" },
            { mot: "une méduse", imgIndex: "meduse.jpg" },
            { mot: "une mouette", imgIndex: "mouette.jpg" },
            { mot: "un palmier", imgIndex: "palmier.jpg" },
            { mot: "un parasol", imgIndex: "parasol.jpg" },
            { mot: "une pelle", imgIndex: "pelle.jpg" },
            { mot: "un poisson", imgIndex: "poisson.jpg" },
            { mot: "un râteau", imgIndex: "rateau.jpg" },
            { mot: "le sable", imgIndex: "sable.jpg" },
            { mot: "un seau", imgIndex: "seau.jpg" },
            { mot: "une serviette de plage", imgIndex: "serviettedeplage.jpg" },
            { mot: "le soleil", imgIndex: "soleil.jpg" },
            { mot: "une vague", imgIndex: "vague.jpg" }
        ];

        // 2. IMAGE DE VICTOIRE
        const imageVictoire = "victoire.jpg";

        let currentWordObject = null;
        let wordToGuess = "";
        let displayedWord = [];
        let maxLives = 4;
        let currentLives = maxLives;

        function normalizeString(str) {
            return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
        }

        function initGame() {
            currentLives = maxLives;
            document.getElementById("lives").textContent = currentLives;
            document.getElementById("message").textContent = "";
            
            // Tirage aléatoire
            const randomIndex = Math.floor(Math.random() * listeMots.length);
            currentWordObject = listeMots[randomIndex];
            wordToGuess = currentWordObject.mot;

            // Afficher l'image d'aide présente dans votre sous-dossier "images"
            const imgElement = document.getElementById("gameImage");
            imgElement.src = "images/" + currentWordObject.imgIndex; 
            imgElement.classList.remove("victory-image");
            imgElement.style.display = "block";
            
            // Préparation des tirets et espaces
            displayedWord = [];
            for (let char of wordToGuess) {
                if (char === " ") {
                    displayedWord.push(" ");
                } else if (char === "-") {
                    displayedWord.push("-");
                } else {
                    displayedWord.push("_");
                }
            }
            
            renderWord();
            generateKeyboard();
        }

        function renderWord() {
            const htmlDisplay = displayedWord.map(char => {
                if (char === " ") return "&nbsp;&nbsp;&nbsp;";
                return char;
            }).join(" ");
            document.getElementById("wordDisplay").innerHTML = htmlDisplay;
        }

        function generateKeyboard() {
            const container = document.getElementById("lettersContainer");
            container.innerHTML = "";
            const alphabet = "abcdefghijklmnopqrstuvwxyz";
            for (let letter of alphabet) {
                const btn = document.createElement("button");
                btn.textContent = letter.toUpperCase();
                btn.classList.add("letter-btn");
                btn.onclick = () => guessLetter(letter, btn);
                container.appendChild(btn);
            }
        }

        function guessLetter(letter, buttonElement) {
            buttonElement.disabled = true;
            let letterFound = false;
            const normalizedTarget = normalizeString(wordToGuess);

            for (let i = 0; i < normalizedTarget.length; i++) {
                if (normalizedTarget[i] === letter) {
                    displayedWord[i] = wordToGuess[i];
                    letterFound = true;
                }
            }

            if (letterFound) {
                renderWord();
                checkWin();
            } else {
                currentLives--;
                document.getElementById("lives").textContent = currentLives;
                checkLose();
            }
        }

        function checkWin() {
            if (!displayedWord.includes("_")) {
                document.getElementById("message").innerHTML = "🎉 Bravo ! Tu as gagné !";
                disableAllButtons();
                
                const imgElement = document.getElementById("gameImage");
                imgElement.src = "images/" + imageVictoire;
                imgElement.classList.add("victory-image");
            }
        }

        function checkLose() {
            if (currentLives <= 0) {
                document.getElementById("message").innerHTML = `Perdu ! Le mot était : <span style="color:#d9534f;">"${wordToGuess.toUpperCase()}"</span>`;
                disableAllButtons();
            }
        }

        function disableAllButtons() {
            const buttons = document.querySelectorAll(".letter-btn");
            buttons.forEach(btn => btn.disabled = true);
        }

        initGame();
    </script>
<script src="../../securite.js"></script>
</body>
</html>
