	function displayQuestion()
		{var questionOptionsText = "";

		 questionTitle.innerHTML = '<legend class="form__legend ">' + 'Question ' + (questionNumber + 1) + '</legend>';
		 questionDefinition.innerHTML = questionsArray[questionNumber][0] + '<br/><br/>';
		 
		 var questionOption;
		 for (questionOption=1; questionOption<=4; questionOption++)
			{questionOptionsText = questionOptionsText + '<input type="radio" id="radioOption" name="radioOption"';

			 	{questionOptionsText = questionOptionsText + ' checked="checked"';
			 	}
			 questionOptionsText = questionOptionsText + '/> ' + questionsArray[questionNumber][questionOption] + '<br/>';
			}
		 questionOptions.innerHTML = questionOptionsText;
		 if (window.jQuery) jQuery('input[type="radio"]',questionOptions).icheck({radioClass:'iradio_minimal'});
		}


	
	function buttonStart_onclick()
		{questionButton.innerHTML = '<br/><br/><input type="button" name="buttonAnswer" id="buttonAnswer" class="btn--action" value="Answer Question" onclick="return buttonAnswer_onclick()"/>';

		}
	


	function buttonAnswer_onclick()
		{checkAnswer();
		 if(questionNumber < answersArray.length - 1)
			{questionNumber++;
			 displayQuestion();
			}
		 else
			{questionTitle.innerHTML = 'Quiz Results and Answers';
			 for (var i=0; i < levelArray.length; i++) {
			 	if (correctAnswers >= levelArray[i]['lower'] && correctAnswers <= levelArray[i]['upper']) {
					var level = levelArray[i]['case'];
				
					break;
				}
			 }
		 	 questionDefinition.innerHTML = correctAnswers + ' out of ' + answersArray.length +  '  questions answered correctly! <b>' + level + '</b>';
		 	 
		 	 var answersText = ""; var answerCounter;
		 	 
		 	 for (answerCounter=0; answerCounter < answersArray.length; answerCounter++)
		 	 	{
					var myclass = mistakesArray[answerCounter] ? 'error':'correct';
					answersText = answersText + '<p><span class="'+myclass+'">Question ' + (answerCounter+1) + ': </span> ' + questionsArray[answerCounter][0] + '<br/>Answer:' + questionsArray[answerCounter][answersArray[answerCounter]] + '</p>';
		 	 	}
		 	 
		 	 questionOptions.innerHTML = answersText;
		 	 questionButton.innerHTML = '';
		 	 
		 	 if (document.getElementById('byLine')) document.getElementById("byLine").innerHTML = "";
			}
		}
		
		
		
	function checkAnswer()
		{var questionOption;
		 var radioOptionArray = document.getElementById('quizForm').elements['radioOption'];
		 for (questionOption=0; questionOption<=3; questionOption++)
		 	{if (radioOptionArray[questionOption].checked == true)
		 		{questionOption++;
		 		 break;
		 		}
		 	}
		 if (questionOption == answersArray[questionNumber]) {
			correctAnswers++;
			mistakesArray[questionNumber]=false;		
		}
		
	}
