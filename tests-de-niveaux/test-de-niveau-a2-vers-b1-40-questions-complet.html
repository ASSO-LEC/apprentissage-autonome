<!doctype html>

		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Test de niveau</title>
		<style>
			body {
				font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
				background-color: #f0f4f8;
				color: #2c3e50;
				padding: 20px;
				display: flex;
				justify-content: center;
			}
			.quiz-container {
				background-color: white;
				padding: 30px;
				border-radius: 12px;
				box-shadow: 0 8px 24px rgba(0,0,0,0.08);
				max-width: 700px;
				width: 100%;
			}
			#questionTitle {
				font-size: 1.5rem;
				font-weight: bold;
				color: #2980b9;
				margin-bottom: 15px;
				border-bottom: 2px solid #ecf0f1;
				padding-bottom: 10px;
			}
			#questionDefinition {
				font-size: 1.1rem;
				margin-bottom: 15px;
			}
			.option-item {
				margin-bottom: 10px;
				font-size: 1rem;
			}
			.btn--action, .restart-btn {
				background-color: #27ae60;
				color: white;
				border: none;
				padding: 12px 20px;
				border-radius: 6px;
				cursor: pointer;
				font-size: 1rem;
				font-weight: bold;
				transition: background 0.2s;
				margin-top: 15px;
			}
			.btn--action:hover, .restart-btn:hover {
				background-color: #219653;
			}
			
			/* Style du rapport de résultats */
			.report-card {
				background-color: #f9f9f9;
				border: 1px solid #e1e8ed;
				border-radius: 8px;
				padding: 15px;
				margin-bottom: 12px;
				text-align: left;
			}
			.report-card.correct {
				border-left: 5px solid #27ae60;
			}
			.report-card.error {
				border-left: 5px solid #e74c3c;
			}
			.q-title {
				font-weight: bold;
				margin-bottom: 5px;
			}
			.user-ans.right {
				color: #27ae60;
				font-weight: bold;
			}
			.user-ans.wrong {
				color: #c0392b;
				font-weight: bold;
			}
			.expected-ans {
				color: #27ae60;
				font-weight: bold;
			}
		</style>
	</head>

		<div class="quiz-container">
			<main role="main">
				<div id="questionTitle">Test de compétences</div>
				<form id="quizForm">
					<div id="questionDefinition">&nbsp;</div>
					<div id="questionOptions">&nbsp;</div>
					<div id="questionButton">&nbsp;</div>
				</form>
			</main>
		</div>

			var correctAnswers = 0;
			var questionNumber = 0;
			var questionsArray = new Array();
			var answersArray = new Array();
			var mistakesArray = new Array();
			var userChoicesArray = new Array(); // Stocke le choix de l'utilisateur
			var levelArray = new Array();

			function displayQuestion() {
				var questionOptionsText = "";
				var questionTitleEl = document.getElementById("questionTitle");
				var questionDefinitionEl = document.getElementById("questionDefinition");
				var questionOptionsEl = document.getElementById("questionOptions");

				questionTitleEl.innerHTML = 'Question ' + (questionNumber + 1) + ' sur ' + questionsArray.length;
				questionDefinitionEl.innerHTML = questionsArray[questionNumber][0] + '<br/><br/>';
				
				for (var questionOption = 1; questionOption <= 4; questionOption++) {
					questionOptionsText += '<div class="option-item"><label><input type="radio" name="radioOption" value="' + questionOption + '"';
					if (questionOption == 1) {
						questionOptionsText += ' checked="checked"';
					}
					questionOptionsText += '/> ' + questionsArray[questionNumber][questionOption] + '</label></div>';
				}
				questionOptionsEl.innerHTML = questionOptionsText;
			}

			function buttonStart_onclick() {
				var questionButtonEl = document.getElementById("questionButton");
				questionButtonEl.innerHTML = '<input type="button" name="buttonAnswer" id="buttonAnswer" class="btn--action" value="Réponse à la question" onclick="buttonAnswer_onclick()"/>';
				displayQuestion();
			}

			function buttonAnswer_onclick() {
				checkAnswer();
				if (questionNumber < answersArray.length - 1) {
					questionNumber++;
					displayQuestion();
				} else {
					showFinalReport();
				}
			}

			function checkAnswer() {
				var radioOptionArray = document.getElementById('quizForm').elements['radioOption'];
				var selectedValue = 1;

				for (var i = 0; i < radioOptionArray.length; i++) {
					if (radioOptionArray[i].checked) {
						selectedValue = parseInt(radioOptionArray[i].value);
						break;
					}
				}

				// Stocke la réponse sélectionnée par l'utilisateur
				userChoicesArray[questionNumber] = selectedValue;

				if (selectedValue == answersArray[questionNumber]) {
					correctAnswers++;
					mistakesArray[questionNumber] = false;		
				} else {
					mistakesArray[questionNumber] = true;
				}
			}

			function showFinalReport() {
				var questionTitleEl = document.getElementById("questionTitle");
				var questionDefinitionEl = document.getElementById("questionDefinition");
				var questionOptionsEl = document.getElementById("questionOptions");
				var questionButtonEl = document.getElementById("questionButton");

				questionTitleEl.innerHTML = 'Résultats et rapport détaillé';
				
				var level = "";
				for (var i = 0; i < levelArray.length; i++) {
					if (correctAnswers >= levelArray[i]['lower'] && correctAnswers <= levelArray[i]['upper']) {
						level = levelArray[i]['case'];
						break;
					}
				}

				questionDefinitionEl.innerHTML = '<strong>Score : ' + correctAnswers + ' / ' + answersArray.length + '</strong><br/><h3>' + level + '</h3>';
				
				var answersText = "";
				for (var answerCounter = 0; answerCounter < answersArray.length; answerCounter++) {
					var isCorrect = !mistakesArray[answerCounter];
					var cardClass = isCorrect ? 'correct' : 'error';
					var userChoiceIdx = userChoicesArray[answerCounter];
					var userChoiceText = questionsArray[answerCounter][userChoiceIdx];
					var expectedChoiceText = questionsArray[answerCounter][answersArray[answerCounter]];

					answersText += '<div class="report-card ' + cardClass + '">';
					answersText += '<div class="q-title">Question ' + (answerCounter + 1) + ' : ' + questionsArray[answerCounter][0] + '</div>';
					
					if (isCorrect) {
						answersText += '<div class="user-ans right">✓ Votre réponse : ' + userChoiceText + '</div>';
					} else {
						answersText += '<div class="user-ans wrong">✗ Votre réponse : ' + userChoiceText + '</div>';
						answersText += '<div class="expected-ans">✓ Réponse attendue : ' + expectedChoiceText + '</div>';
					}
					answersText += '</div>';
				}
				
				questionOptionsEl.innerHTML = answersText;
				questionButtonEl.innerHTML = '<input type="button" class="restart-btn" value="Recommencer" onclick="location.reload()"/>';
			}
