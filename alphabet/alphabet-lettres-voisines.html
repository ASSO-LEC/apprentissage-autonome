<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Les lettres voisines</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            max-width: 650px; 
            margin: 40px auto; 
            padding: 20px; 
            line-height: 1.8;
            background-color: #fcf5f5;
        }
        .game-box { 
            background: #ffffff; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 2px solid #f5c6cb; 
        }
        h2 { color: #dc3545; margin-top: 0; }
        p { color: #555; }
        
        .block-zone {
            margin: 25px 0;
        }
        .block { 
            font-size: 22px; 
            margin: 20px 0; 
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8d7da;
            padding: 10px;
            border-radius: 8px;
        }
        .center-letter {
            display: inline-block;
            width: 50px;
            text-align: center;
            font-weight: bold;
            color: #dc3545;
            font-size: 26px;
        }
        .arrow {
            margin: 0 15px;
            color: #6c757d;
        }
        input { 
            width: 40px; 
            height: 40px;
            text-align: center; 
            font-size: 22px; 
            text-transform: uppercase; 
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            font-weight: bold;
        }
        input:focus {
            outline: none;
            border-color: #dc3545;
            background-color: #fff5f5;
        }
        
        .btn-group {
            display: flex;
            gap: 15px;
        }
        button { 
            padding: 12px 25px; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold;
        }
        #btn-verifier { background: #dc3545; }
        #btn-verifier:hover { background: #bd2130; }
        
        #btn-recommencer { background: #6c757d; display: none; }
        #btn-recommencer:hover { background: #5a6268; }
        
        .result { 
            margin-top: 20px; 
            padding: 15px; 
            border-radius: 6px; 
            font-size: 16px; 
            display: none; 
            line-height: 1.6;
        }
        .correct { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .incorrect { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

    <div class="game-box">
        <h2>Les lettres voisines 🎯</h2>
        <p>Écrivez la lettre qui vient juste <strong>avant</strong> et celle qui vient juste <strong>après</strong> en MAJUSCULE.</p>
        
        <div class="block-zone" id="jeu-container">
            <!-- Les 4 séries de lettres seront générées ici -->
        </div>

        <div class="btn-group">
            <button id="btn-verifier" onclick="verifierVoisins()">Vérifier mes réponses par JPJ</button>
            <button id="btn-recommencer" onclick="initialiserJeu()">Recommencer (Mélanger les lettres)</button>
        </div>
        
        <div id="correction" class="result"></div>
    </div>

    <script>
        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        let lettresSelectionnees = [];

        // Fonction pour lancer et réinitialiser le jeu avec de nouvelles lettres
        function initialiserJeu() {
            lettresSelectionnees = [];
            const container = document.getElementById('jeu-container');
            const correctionDiv = document.getElementById('correction');
            
            container.innerHTML = "";
            correctionDiv.style.display = "none";
            document.getElementById('btn-verifier').style.display = "inline-block";
            document.getElementById('btn-recommencer').style.display = "none";

            // On choisit 4 index aléatoires entre 1 (B) et 24 (Y) pour éviter les blocages avec A et Z
            while (lettresSelectionnees.length < 4) {
                let indexAleatoire = Math.floor(Math.random() * 24) + 1; 
                let lettre = alphabet[indexAleatoire];
                
                if (!lettresSelectionnees.includes(lettre)) {
                    lettresSelectionnees.push(lettre);
                }
            }

            // Génération de l'interface pour les 4 lignes
            lettresSelectionnees.forEach((lettre, i) => {
                const div = document.createElement('div');
                div.className = 'block';
                div.innerHTML = `
                    <input type="text" id="avant-${i}" maxlength="1"> 
                    <span class="arrow">←</span> 
                    <span class="center-letter">${lettre}</span> 
                    <span class="arrow">→</span> 
                    <input type="text" id="apres-${i}" maxlength="1">
                `;
                container.appendChild(div);
            });
        }

        function verifierVoisins() {
            let erreurs = [];
            let correctionHtml = "<strong>La correction :</strong><br>";

            lettresSelectionnees.forEach((lettre, i) => {
                const indexAlphabet = alphabet.indexOf(lettre);
                const reponseAvantAttendue = alphabet[indexAlphabet - 1];
                const reponseApresAttendue = alphabet[indexAlphabet + 1];

                const saisieAvant = document.getElementById(`avant-${i}`).value.toUpperCase().trim();
                const saisieApres = document.getElementById(`apres-${i}`).value.toUpperCase().trim();

                let ligneErreur = false;

                if (saisieAvant !== reponseAvantAttendue) {
                    document.getElementById(`avant-${i}`).style.borderColor = "#dc3545";
                    ligneErreur = true;
                } else {
                    document.getElementById(`avant-${i}`).style.borderColor = "#28a745";
                }

                if (saisieApres !== reponseApresAttendue) {
                    document.getElementById(`apres-${i}`).style.borderColor = "#dc3545";
                    ligneErreur = true;
                } else {
                    document.getElementById(`apres-${i}`).style.borderColor = "#28a745";
                }

                if (ligneErreur) {
                    erreurs.push(lettre);
                }

                correctionHtml += `• Pour <strong>${lettre}</strong> : ${reponseAvantAttendue} ← ${lettre} → ${reponseApresAttendue}<br>`;
            });

            const div = document.getElementById('correction');
            div.style.display = "block";

            if (erreurs.length === 0) {
                div.className = "result correct";
                div.innerHTML = "<strong>Parfait !</strong> Vous avez trouvé tous les voisins sans faire d'erreur !";
            } else {
                div.className = "result incorrect";
                div.innerHTML = `<strong>Dommage !</strong> Il y a des erreurs dans vos suites.<br><br>` + correctionHtml;
            }

            // Gestion de l'affichage des boutons
            document.getElementById('btn-verifier').style.display = "none";
            document.getElementById('btn-recommencer').style.display = "inline-block";
        }

        // Lancement automatique du jeu à l'ouverture de la page
        window.onload = initialiserJeu;
    </script>


<script src="../securite.js"></script>
</body>
</html>
