<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Sons Compliqués</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 700px; margin: 40px auto; padding: 20px; background-color: #fff5f5; }
        .game-box { background: #ffffff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 2px solid #f5c6cb; }
        h2 { color: #dc3545; margin-top: 0; }
        .btn-audio { padding: 8px 15px; font-size: 16px; margin-right: 20px; cursor: pointer; background: #fff5f5; border: 1px solid #f5c6cb; border-radius: 6px; font-weight: bold; color: #c82333; }
        .btn-audio:hover { background: #f8d7da; }
        .row { margin: 25px 0; display: flex; align-items: center; background: #f8f9fa; padding: 15px; border-radius: 8px; border-left: 4px solid #dc3545; }
        .options-group { display: flex; gap: 20px; }
        .options-group label { font-size: 18px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .options-group input { transform: scale(1.2); }
        .btn-group { display: flex; gap: 15px; margin-top: 25px; }
        button.action-btn { padding: 12px 25px; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }
        #btn-verifier { background: #dc3545; }
        #btn-verifier:hover { background: #bd2130; }
        #btn-recommencer { background: #6c757d; display: none; }
        #btn-recommencer:hover { background: #5a6268; }
        .result { margin-top: 20px; padding: 15px; border-radius: 6px; font-size: 16px; display: none; line-height: 1.6; }
        .correct { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .incorrect { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <div class="game-box">
        <h2>Les pièges de l'alphabet 🎧</h2>
        <p>Attention aux confusions fréquentes (B/P, C/S, G/J, V/B...) ! Écoutez attentivement.</p>
        <div id="questions-container"></div>
        <div class="btn-group">
            <button id="btn-verifier" class="action-btn" onclick="verifierAudio()">Vérifier mes choix par JPJ</button>
            <button id="btn-recommencer" class="action-btn" onclick="initialiserJeuAudio()">Tenter un autre mélange</button>
        </div>
        <div id="correction" class="result"></div>
    </div>

    <script>
        // Groupes de lettres à forte confusion phonétique en français
        const groupesPieges = [
            ["B", "P", "D", "T"],
            ["G", "J", "I", "Z"],
            ["C", "S", "K", "Q"],
            ["V", "B", "W", "F"],
            ["M", "N", "L", "R"],
            ["E", "I", "U", "H"]
        ];
        let questionsSession = [];

        function mélanger(tableau) {
            return tableau.sort(() => Math.random() - 0.5);
        }

        function ecouter(lettre) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let uttr = new SpeechSynthesisUtterance(lettre);
                uttr.lang = 'fr-FR';
                uttr.rate = 0.75;
                window.speechSynthesis.speak(uttr);
            }
        }

        function initialiserJeuAudio() {
            const container = document.getElementById('questions-container');
            container.innerHTML = "";
            document.getElementById('correction').style.display = "none";
            document.getElementById('btn-verifier').style.display = "inline-block";
            document.getElementById('btn-recommencer').style.display = "none";
            
            questionsSession = [];
            
            // On sélectionne 4 groupes pièges aléatoires parmi les 6 disponibles
            let groupesChoisis = mélanger([...groupesPieges]).slice(0, 4);

            groupesChoisis.forEach((groupe, indexQuestion) => {
                // Les options de la ligne seront exactement les lettres du groupe mélangées
                let toutesLesOptions = mélanger([...groupe]);
                // La bonne réponse est l'une de ces lettres choisie au hasard
                let lettreCorrecte = toutesLesOptions[Math.floor(Math.random() * toutesLesOptions.length)];
                
                questionsSession.push({ correcte: lettreCorrecte });

                const row = document.createElement('div');
                row.className = 'row';
                let optionsHtml = `<div class="options-group">`;
                toutesLesOptions.forEach(option => {
                    optionsHtml += `<label><input type="radio" name="audio-q-${indexQuestion}" value="${option}"> ${option}</label>`;
                });
                optionsHtml += `</div>`;

                row.innerHTML = `<button class="btn-audio" onclick="ecouter('${lettreCorrecte}')">🔊 Écouter ${indexQuestion + 1}</button>${optionsHtml}`;
                container.appendChild(row);
            });
        }

        function verifierAudio() {
            let score = 0;
            let correctionHtml = "";
            questionsSession.forEach((q, indexQuestion) => {
                const caseCochee = document.querySelector(`input[name="audio-q-${indexQuestion}"]:checked`);
                const valeurCochee = caseCochee ? caseCochee.value : null;
                if (valeurCochee === q.correcte) {
                    score++;
                    correctionHtml += `• Ligne ${indexQuestion + 1} : Correct (${q.correcte})<br>`;
                } else {
                    correctionHtml += `• Ligne ${indexQuestion + 1} : Piège activé ! C'était la lettre <strong>${q.correcte}</strong>.<br>`;
                }
            });

            const div = document.getElementById('correction');
            div.style.display = "block";
            div.className = score === 4 ? "result correct" : "result incorrect";
            div.innerHTML = `<strong>Score : ${score}/4</strong><br>` + correctionHtml;
            document.getElementById('btn-verifier').style.display = "none";
            document.getElementById('btn-recommencer').style.display = "inline-block";
        }

        window.onload = initialiserJeuAudio;
    </script>
</body>
</html>
