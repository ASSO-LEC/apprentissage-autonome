<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conjugaison Le Futur Simple 1er groupe</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #334155;
            --success: #16a34a;
            --danger: #dc2626;
            --border: #cbd5e1;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            line-height: 1.8;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            background: var(--bg-card);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        .header {
            background: var(--primary);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            margin: 0 0 10px 0;
            font-size: 2rem;
        }

        .header p {
            margin: 0;
            opacity: 0.9;
        }

        .quiz-content {
            padding: 40px;
            font-size: 1.15rem;
        }

        .input-box {
            display: inline-flex;
            flex-direction: column;
            vertical-align: middle;
            margin: 0 4px;
            position: relative;
        }

        .input-blank {
            font-size: 1.1rem;
            font-family: inherit;
            padding: 2px 6px;
            border: none;
            border-bottom: 2px solid var(--primary);
            background: transparent;
            width: 140px;
            text-align: center;
            outline: none;
            color: #1e293b;
            transition: border-color 0.2s, background-color 0.2s;
        }

        .input-blank:focus {
            background-color: #f0fdf4;
            border-bottom-color: var(--primary-hover);
        }

        .input-blank::placeholder {
            color: #94a3b8;
            font-size: 0.9rem;
            font-style: italic;
        }

        .correct {
            color: var(--success) !important;
            border-bottom-color: var(--success) !important;
            font-weight: bold;
        }

        .incorrect {
            color: var(--danger) !important;
            border-bottom-color: var(--danger) !important;
            text-decoration: line-through;
        }

        .correction {
            font-size: 0.8rem;
            color: var(--success);
            font-weight: bold;
            text-align: center;
            display: block;
            margin-top: -2px;
            line-height: 1;
        }

        .controls {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .score {
            font-size: 1.3rem;
            font-weight: bold;
        }

        .btn {
            font-family: inherit;
            font-size: 1rem;
            font-weight: bold;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #475569;
        }

        .btn-secondary:hover {
            background: #cbd5e1;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:disabled {
            background: #cbd5e1;
            color: #94a3b8;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>L'Île aux Secrets (Partie 1)</h1>
        <p>Conjugue les verbes au <strong>futur simple</strong>.</p>
    </div>

    <div class="quiz-content">
        <div id="story"></div>

        <div class="controls">
            <div class="score">Score : <span id="score-val">0</span> / 23</div>
            <div>
                <button class="btn btn-secondary" onclick="resetQuiz()">Recommencer</button>
                <button class="btn btn-primary" id="submit-btn" onclick="checkQuiz()">Vérifier avec JPJ</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Liste nettoyée et ajustée à exactement 50 entrées valides
    const database = [
        { avant: "1. Demain, nous ", verbe: "aller", attendu: "irons", apres: " vers une île inconnue." },  
        { avant: "2. Je ", verbe: "être", attendu: "serai", apres: " le capitaine du navire." },
        { avant: "3. Tu ", verbe: "avoir", attendu: "auras", apres: " la lourde tâche de tenir la barre." },
        { avant: "4. Les matelots ", verbe: "préparer", attendu: "prépareront", apres: " les voiles dès l'aube." },
        { avant: "5. Le vent ", verbe: "pousser", attendu: "poussera", apres: " notre embarcation." },
        { avant: "6. Vous ", verbe: "regarder", attendu: "regarderez", apres: " la côte s'éloigner." },
        { avant: "7. Les vagues ", verbe: "faire", attendu: "feront", apres: " bouger la coque de bois." },
        { avant: "8. Le cuisinier ", verbe: "allumer", attendu: "allumera", apres: " le vieux poêle." },
        { avant: "9. Nous ", verbe: "manger", attendu: "mangerons", apres: " du poisson séché." },
        { avant: "10. Je ", verbe: "chercher", attendu: "chercherai", apres: " la route sur la carte." },
        { avant: "11. Tu ", verbe: "trouver", attendu: "trouveras", apres: " le cap au nord." },
        { avant: "12. Le grand dauphin ", verbe: "sauter", attendu: "sautera", apres: " près de nous." },
        { avant: "13. Les marins ", verbe: "crier", attendu: "crieront", apres: " de joie." },
        { avant: "14. Ce voyage ", verbe: "être", attendu: "sera", apres: " une vraie réussite." },
        { avant: "15. Vous ", verbe: "avoir", attendu: "aurez", apres: " de la chance de voir ça !" },
        { avant: "16. L'équipage ", verbe: "abaisser", attendu: "abaissera", apres: " l'ancre près du rivage." },
        { avant: "17. Nous ", verbe: "monter", attendu: "monterons", apres: " dans une petite barque." },
        { avant: "18. Je ", verbe: "ramer", attendu: "ramerai", apres: " de toutes mes forces." },
        { avant: "19. Tu ", verbe: "observer", attendu: "observeras", apres: " les arbres géants." },
        { avant: "20. Elle ", verbe: "aller", attendu: "ira", apres: " la première sur le sable." },
        { avant: "21. Nous ", verbe: "marcher", attendu: "marcherons", apres: " de longues heures." },
        { avant: "22. Le soleil ", verbe: "briller", attendu: "brillera", apres: " dans le ciel pur." },
        { avant: "23. Vous ", verbe: "écouter", attendu: "écouterez", apres: " les bruits de la jungle." }
        
    ];

    function buildQuiz() {
        const target = document.getElementById('story');
        let html = "";
        
        database.forEach((block, idx) => {
            // L'ajout du <br><br> à la fin de chaque bloc force le retour à la ligne pour chaque phrase
            html += `${block.avant} 
            <div class="input-box">
                <input type="text" id="blank-${idx}" class="input-blank" placeholder="(${block.verbe})" autocomplete="off">
                <span id="corr-${idx}" class="correction"></span>
            </div> 
            ${block.apres}<br><br>`;
        });
        
        target.innerHTML = html;
    }

    function checkQuiz() {
        let finalScore = 0;
        
        database.forEach((block, idx) => {
            const field = document.getElementById(`blank-${idx}`);
            const errorSpan = document.getElementById(`corr-${idx}`);
            const userAns = field.value.trim().toLowerCase();
            
            if (userAns === block.attendu.toLowerCase()) {
                field.className = "input-blank correct";
                errorSpan.textContent = "";
                finalScore++;
            } else {
                field.className = "input-blank incorrect";
                errorSpan.textContent = block.attendu;
            }
            field.disabled = true;
        });
        
        document.getElementById('score-val').textContent = finalScore;
        const subBtn = document.getElementById('submit-btn');
        subBtn.disabled = true;
    }

    function resetQuiz() {
        buildQuiz();
        document.getElementById('score-val').textContent = "0";
        document.getElementById('submit-btn').disabled = false;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Lancement au chargement
    buildQuiz();
</script>

</body>
</html>
