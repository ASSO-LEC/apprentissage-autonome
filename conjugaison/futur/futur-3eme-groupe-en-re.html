<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Futur Simple (Verbes en -RE)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .quiz-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 650px;
            width: 100%;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 5px;
        }
        p.subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 25px;
        }
        .instruction {
            background-color: #e8f4f8;
            padding: 10px 15px;
            border-left: 5px solid #3498db;
            margin-bottom: 20px;
            font-weight: 500;
        }
        .question-block {
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 1px dashed #e0e0e0;
            font-size: 1.1rem;
        }
        .verb-hint {
            color: #e67e22;
            font-weight: bold;
            font-size: 0.95rem;
        }
        input[type="text"] {
            padding: 6px 10px;
            font-size: 1rem;
            border: 2px solid #bdc3c7;
            border-radius: 4px;
            width: 140px;
            text-align: center;
            transition: all 0.3s;
        }
        input[type="text"]:focus {
            border-color: #3498db;
            outline: none;
        }
        .correct {
            background-color: #2ecc71 !important;
            color: white;
            border-color: #27ae60 !important;
        }
        .incorrect {
            background-color: #e74c3c !important;
            color: white;
            border-color: #c0392b !important;
        }
        .btn-container {
            text-align: center;
            margin-top: 25px;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #2980b9;
        }
        #result {
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
        }
        .feedback {
            font-size: 0.9rem;
            margin-left: 10px;
            font-weight: bold;
        }
        .feedback.ok { color: #27ae60; }
        .feedback.ko { color: #c0392b; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>Exercice de Conjugaison</h1>
    <p class="subtitle">Le Futur Simple des verbes en -RE  fiche n°2 du LEC</p>
    
    <div class="instruction">
        Consigne : Conjugue le verbe entre parenthèses au futur simple. 
    </div>

    <form id="quizForm">
        <div id="quiz-questions"></div>

        <div class="btn-container">
            <button type="button" onclick="verifierReponses()">Vérifier mes réponses par JPJ</button>
        </div>
    </form>

    <div id="result"></div>
</div>

<script>
const questionsData = [
    { avant: "IL", verbe: "Éteindre", apres: " la lumière.", attendu: "Il éteindra" },
    { avant: "Je", verbe: "Répondre", apres: " aux questions.", attendu: "Je répondrai" },
    { avant: "Tu ", verbe: "Connaître", apres: " la vérité.", attendu: "connaîtras" },
    { avant: "Tu ", verbe: "Prendre", apres: " le métro.", attendu: "prendras" },
    { avant: "Nous ", verbe: "Peindre", apres: " les murs.", attendu: "peindrons" },
    { avant: "Vous ", verbe: "Rendre", apres: " le livre.", attendu: "rendrez" },
    { avant: "Ils ", verbe: "Produire", apres: " du pétrole.", attendu: "produiront" },
    { avant: "Nous ", verbe: "Comprendre", apres: " le français.", attendu: "comprendrons" },
    { avant: "Nous ", verbe: "Cuire", apres: " la viande.", attendu: "cuirons" },
    { avant: "Elles ", verbe: "Entendre", apres: " mieux.", attendu: "entendront" },
    { avant: "Vous ", verbe: "Disparaître", apres: " de ma vue.", attendu: "disparaîtrez" },
    { avant: "Ils ", verbe: "Apprendre", apres: " le français.", attendu: "apprendront" },
    { avant: "Il ", verbe: "Conduire", apres: " sa nouvelle voiture.", attendu: "conduira" },
    { avant: "Nous ", verbe: "Attendre", apres: " l'autobus.", attendu: "attendrons" }
];

const container = document.getElementById('quiz-questions');

questionsData.forEach((item, index) => {
    const div = document.createElement('div');
    div.className = 'question-block';
    div.innerHTML = `
        ${index + 1}. ${item.avant} 
        <input type="text" id="q${index}" autocomplete="off"> 
        ${item.apres} 
        <span class="verb-hint">(${item.verbe})</span>
        <span id="feedback${index}" class="feedback"></span>
    `;
    container.appendChild(div);
});

function verifierReponses() {
    let score = 0;
    
    questionsData.forEach((item, index) => {
        const input = document.getElementById(`q${index}`);
        const feedback = document.getElementById(`feedback${index}`);
        const reponseEleve = input.value.trim().toLowerCase();
        
        // On prépare la réponse attendue en version minuscule
        const attenduMinuscule = item.attendu.toLowerCase();
        // On crée une version alternative sans l'accent circonflexe sur le 'î'
        const attenduSansAccent = attenduMinuscule.replace('î', 'i');
        
        // L'élève a bon s'il tape la version officielle OU la version simplifiée
        if (reponseEleve === attenduMinuscule || reponseEleve === attenduSansAccent) {
            input.className = "correct";
            feedback.innerHTML = "✓";
            feedback.className = "feedback ok";
            score++;
        } else {
            input.className = "incorrect";
            feedback.innerHTML = `✗ (Attendu : ${item.attendu})`;
            feedback.className = "feedback ko";
        }
    });
    
    const resultDiv = document.getElementById('result');
    resultDiv.innerHTML = `Votre score : ${score} / ${questionsData.length}`;
    
    if (score === questionsData.length) {
        resultDiv.style.color = "#27ae60";
        resultDiv.innerHTML += " - Excellent ! 🎉";
    } else if (score >= questionsData.length / 2) {
        resultDiv.style.color = "#e67e22";
        resultDiv.innerHTML += " - Pas mal, continuez à réviser ! 👍";
    } else {
        resultDiv.style.color = "#c0392b";
        resultDiv.innerHTML += " - Courage, relisez bien vos terminaisons. 💪";
    }
}
</script>
<script src="../../securite.js"></script>
</body>
</html>
