<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conjugaison Le Futur Simple 1er groupe</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #334155;
            --success: #16a34a;
            --danger: #dc2626;
            --border: #cbd5e1;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            line-height: 1.8;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            background: var(--bg-card);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        .header {
            background: var(--primary);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            margin: 0 0 10px 0;
            font-size: 2rem;
        }

        .header p {
            margin: 0;
            opacity: 0.9;
        }

        .quiz-content {
            padding: 40px;
            font-size: 1.15rem;
        }

        .input-box {
            display: inline-flex;
            flex-direction: column;
            vertical-align: middle;
            margin: 0 4px;
            position: relative;
        }

        .input-blank {
            font-size: 1.1rem;
            font-family: inherit;
            padding: 2px 6px;
            border: none;
            border-bottom: 2px solid var(--primary);
            background: transparent;
            width: 140px;
            text-align: center;
            outline: none;
            color: #1e293b;
            transition: border-color 0.2s, background-color 0.2s;
        }

        .input-blank:focus {
            background-color: #f0fdf4;
            border-bottom-color: var(--primary-hover);
        }

        .input-blank::placeholder {
            color: #94a3b8;
            font-size: 0.9rem;
            font-style: italic;
        }

        .correct {
            color: var(--success) !important;
            border-bottom-color: var(--success) !important;
            font-weight: bold;
        }

        .incorrect {
            color: var(--danger) !important;
            border-bottom-color: var(--danger) !important;
            text-decoration: line-through;
        }

        .correction {
            font-size: 0.8rem;
            color: var(--success);
            font-weight: bold;
            text-align: center;
            display: block;
            margin-top: -2px;
            line-height: 1;
        }

        .controls {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .score {
            font-size: 1.3rem;
            font-weight: bold;
        }

        .btn {
            font-family: inherit;
            font-size: 1rem;
            font-weight: bold;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #475569;
        }

        .btn-secondary:hover {
            background: #cbd5e1;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:disabled {
            background: #cbd5e1;
            color: #94a3b8;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>L'Île aux Secrets (Partie 2)</h1>
        <p>Conjugue les verbes au <strong>futur simple</strong> 1er groupe et les irréguliers indispensables.</p>
    </div>

    <div class="quiz-content">
        <div id="story"></div>

        <div class="controls">
            <div class="score">Score : <span id="score-val">0</span> / 27</div>
            <div>
                <button class="btn btn-secondary" onclick="resetQuiz()">Recommencer</button>
                <button class="btn btn-primary" id="submit-btn" onclick="checkQuiz()">Vérifier par JPJ</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Liste nettoyée et ajustée à exactement 50 entrées valides
    const database = [
        
        { avant: "1. Les singes ", verbe: "agiter", attendu: "agiteront", apres: " les branches." },
        { avant: "2. Je ", verbe: "faire", attendu: "ferai", apres: " un signe de la main." },
        { avant: "3. Tu ", verbe: "avancer", attendu: "avanceras", apres: " sans faire de bruit." },
        { avant: "4. Nous ", verbe: "trouver", attendu: "trouverons", apres: " une entrée secrète." },
        { avant: "5. Elle ", verbe: "éclairer", attendu: "éclairera", apres: " le passage avec une torche." },
        { avant: "6. Ce tunnel ", verbe: "être", attendu: "sera", apres: " très sombre." },
        { avant: "7. Vous ", verbe: "avoir", attendu: "aurez", apres: " un frisson de peur." },
        { avant: "8. Ils ", verbe: "ramasser", attendu: "ramasseront", apres: " de vieux objets en or." },
        { avant: "9. J' ", verbe: "étudier", attendu: "étudierai", apres: " les inscriptions sur le mur." },
        { avant: "10. Tu ", verbe: "dessiner", attendu: "dessineras", apres: " un plan pour le retour." },
        { avant: "11. Le gardien du temple ", verbe: "arriver", attendu: "arrivera", apres: " brusquement." },
        { avant: "12. Il nous ", verbe: "demander", attendu: "demandera", apres: " nos intentions." },
        { avant: "13. Nous ", verbe: "expliquer", attendu: "expliquerons", apres: " nos recherches." },
        { avant: "14. Le vieil homme ", verbe: "accepter", attendu: "acceptera", apres: " nos excuses." },      
        { avant: "15. Vous ", verbe: "aller", attendu: "irez", apres: " encore plus loin la prochaine fois !" },
        { avant: "16. On ", verbe: "avoir", attendu: "aura", apres: " des souvenirs plein la tête." },
        { avant: "17. Je ", verbe: "fermer", attendu: "fermerai", apres: " mon sac à dos." },
        { avant: "18. Tu ", verbe: "saluer", attendu: "salueras", apres: " le vieux sage." },
		{ avant: "19. Il ", verbe: "tourner", attendu: "tournera", apres: " la poignée de la porte." },
        { avant: "20. Nous ", verbe: "quitter", attendu: "quitterons", apres: " cette île sacrée." },
		{ avant: "20. Les vagues se ", verbe: "former", attendu: "formeront", apres: "et" },
        { avant: "21. elles ", verbe: "recommencer", attendu: "recommenceront", apres: " à danser." },
        { avant: "22. Le navire ", verbe: "naviguer", attendu: "naviguera", apres: " vers l'horizon." },
        { avant: "23. Je ", verbe: "penser", attendu: "penserai", apres: " à cette aventure toute ma vie." },
        { avant: "24. Cette épopée ", verbe: "rester", attendu: "restera", apres: " gravée dans l'histoire." },
        { avant: "25. Vous ", verbe: "être", attendu: "serez", apres: " fiers de votre courage !" },
        { avant: "26. Tout le monde ", verbe: "aimer", attendu: "aimera", apres: " raconter ce voyage." }
    ];

    function buildQuiz() {
        const target = document.getElementById('story');
        let html = "";
        
        database.forEach((block, idx) => {
            // L'ajout du <br><br> à la fin de chaque bloc force le retour à la ligne pour chaque phrase
            html += `${block.avant} 
            <div class="input-box">
                <input type="text" id="blank-${idx}" class="input-blank" placeholder="(${block.verbe})" autocomplete="off">
                <span id="corr-${idx}" class="correction"></span>
            </div> 
            ${block.apres}<br><br>`;
        });
        
        target.innerHTML = html;
    }

    function checkQuiz() {
        let finalScore = 0;
        
        database.forEach((block, idx) => {
            const field = document.getElementById(`blank-${idx}`);
            const errorSpan = document.getElementById(`corr-${idx}`);
            const userAns = field.value.trim().toLowerCase();
            
            if (userAns === block.attendu.toLowerCase()) {
                field.className = "input-blank correct";
                errorSpan.textContent = "";
                finalScore++;
            } else {
                field.className = "input-blank incorrect";
                errorSpan.textContent = block.attendu;
            }
            field.disabled = true;
        });
        
        document.getElementById('score-val').textContent = finalScore;
        const subBtn = document.getElementById('submit-btn');
        subBtn.disabled = true;
    }

    function resetQuiz() {
        buildQuiz();
        document.getElementById('score-val').textContent = "0";
        document.getElementById('submit-btn').disabled = false;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Lancement au chargement
    buildQuiz();
</script>

</body>
</html>
